<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- fundo ônix -->
  <rect width="100" height="100" fill="#14110D"/>

  <!-- escudo preenchido em ouro — forma principal -->
  <path d="M20,14 L80,14 Q92,14 92,28 L92,62 Q92,88 50,98 Q8,88 8,62 L8,28 Q8,14 20,14 Z" fill="#C2A14E"/>

  <!-- viga da balança (escuro, espesso) -->
  <rect x="16" y="40" width="68" height="7" rx="3.5" fill="#14110D"/>

  <!-- haste central da espada (escuro) -->
  <rect x="46.5" y="18" width="7" height="62" rx="3.5" fill="#14110D"/>

  <!-- pomo da espada -->
  <circle cx="50" cy="18" r="7" fill="#14110D"/>

  <!-- prato esquerdo (triângulo cheio) -->
  <path d="M22,47 L13,68 Q22,74 31,68 Z" fill="#14110D"/>

  <!-- prato direito -->
  <path d="M78,47 L69,68 Q78,74 87,68 Z" fill="#14110D"/>
</svg>
